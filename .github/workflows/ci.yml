name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test — ${{ matrix.sample }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sample:
          - sample-http
          - sample-messaging

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build producer (Maven)
        working-directory: ${{ matrix.sample }}/producer
        run: ./mvnw clean install --no-transfer-progress

      - name: Build consumer (Maven)
        working-directory: ${{ matrix.sample }}/consumer
        run: ./mvnw clean install --no-transfer-progress

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results — ${{ matrix.sample }}
          path: '${{ matrix.sample }}/**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
