description: "Should grant beer when person is old enough"
request:
  method: POST
  url: /check
  headers:
    Content-Type: application/json
  body:
    age: 22
  matchers:
    body:
      - path: $.age
        type: by_regex
        value: "[0-9]+"
response:
  status: 200
  headers:
    Content-Type: text/plain;charset=UTF-8
  body: "OK"
